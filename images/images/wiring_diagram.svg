<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>
  <rect width="900" height="640" fill="#f8f9fa" rx="12"/>
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">ST3215 Servo Tester — Wiring Diagram</text>
  <rect x="310" y="50" width="280" height="360" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="72" text-anchor="middle" font-weight="bold" fill="#1e40af">Raspberry Pi Pico</text>
  <text x="450" y="86" text-anchor="middle" font-size="10" fill="#1e40af">+ Seeed Grove Shield v1.0</text>
  <rect x="320" y="100" width="110" height="30" rx="4" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="375" y="117" text-anchor="middle" font-size="11" fill="#1e3a8a">Grove I2C0</text>
  <text x="375" y="128" text-anchor="middle" font-size="9" fill="#1e3a8a">SDA=GP4 · SCL=GP5</text>
  <rect x="320" y="145" width="110" height="30" rx="4" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="375" y="162" text-anchor="middle" font-size="11" fill="#1e3a8a">Grove I2C1</text>
  <text x="375" y="173" text-anchor="middle" font-size="9" fill="#dc2626">SDA=GP6 · SCL=GP7</text>
  <rect x="320" y="190" width="110" height="30" rx="4" fill="#bbf7d0" stroke="#22c55e" stroke-width="1.5"/>
  <text x="375" y="207" text-anchor="middle" font-size="11" fill="#14532d">Grove UART0</text>
  <text x="375" y="218" text-anchor="middle" font-size="9" fill="#14532d">TX=GP0 · RX=GP1</text>
  <rect x="320" y="234" width="110" height="30" rx="4" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="375" y="250" text-anchor="middle" font-size="10" fill="#3730a3">Micro-USB</text>
  <text x="375" y="262" text-anchor="middle" font-size="9" fill="#3730a3">Power + USB MIDI</text>
  <rect x="320" y="278" width="110" height="40" rx="4" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="375" y="294" text-anchor="middle" font-size="10" fill="#713f12">Power Switch</text>
  <text x="375" y="306" text-anchor="middle" font-size="9" fill="#713f12">Set to 3.3 V</text>
  <text x="375" y="317" text-anchor="middle" font-size="9" fill="#713f12">for I2C modules</text>
  <rect x="450" y="100" width="120" height="185" rx="4" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="510" y="115" text-anchor="middle" font-size="10" font-weight="bold" fill="#075985">GP Pin Map</text>
  <text x="510" y="130" text-anchor="middle" font-size="9" fill="#0c4a6e">GP0 → UART0 TX</text>
  <text x="510" y="143" text-anchor="middle" font-size="9" fill="#0c4a6e">GP1 → UART0 RX</text>
  <text x="510" y="156" text-anchor="middle" font-size="9" fill="#0c4a6e">GP4 → I2C0 SDA</text>
  <text x="510" y="169" text-anchor="middle" font-size="9" fill="#0c4a6e">GP5 → I2C0 SCL</text>
  <text x="510" y="182" text-anchor="middle" font-size="9" fill="#dc2626">GP6 → I2C1 SDA ★</text>
  <text x="510" y="195" text-anchor="middle" font-size="9" fill="#dc2626">GP7 → I2C1 SCL ★</text>
  <text x="510" y="212" text-anchor="middle" font-size="9" fill="#6b7280">Serial1 = UART0</text>
  <text x="510" y="225" text-anchor="middle" font-size="9" fill="#6b7280">Wire  = I2C0</text>
  <text x="510" y="238" text-anchor="middle" font-size="9" fill="#6b7280">Wire1 = I2C1</text>
  <text x="510" y="278" text-anchor="middle" font-size="8" fill="#dc2626">★ Updated: was GP2/GP3</text>
  <rect x="30" y="60" width="200" height="110" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="130" y="80" text-anchor="middle" font-weight="bold" fill="#831843">M5Stack OLED Unit</text>
  <text x="130" y="95" text-anchor="middle" font-size="10" fill="#831843">1.3″ SH1107 · 128×64</text>
  <text x="130" y="110" text-anchor="middle" font-size="10" fill="#831843">I2C addr: 0x3C</text>
  <text x="130" y="125" text-anchor="middle" font-size="10" fill="#831843">Grove HY2.0-4P cable</text>
  <text x="130" y="143" text-anchor="middle" font-size="9" fill="#9f1239">→ Grove I2C0 (GP4/GP5)</text>
  <line x1="230" y1="115" x2="320" y2="115" stroke="#ec4899" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <rect x="30" y="200" width="200" height="110" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="130" y="220" text-anchor="middle" font-weight="bold" fill="#064e3b">M5Stack Encoder Unit</text>
  <text x="130" y="236" text-anchor="middle" font-size="10" fill="#064e3b">STM32F030 · 30 pos/rev</text>
  <text x="130" y="251" text-anchor="middle" font-size="10" fill="#064e3b">2× SK6812 RGB LEDs</text>
  <text x="130" y="266" text-anchor="middle" font-size="10" fill="#064e3b">I2C addr: 0x40</text>
  <text x="130" y="281" text-anchor="middle" font-size="10" fill="#064e3b">Grove HY2.0-4P cable</text>
  <text x="130" y="299" text-anchor="middle" font-size="9" fill="#dc2626">→ Grove I2C1 (GP6/GP7) ★</text>
  <line x1="230" y1="255" x2="320" y2="160" stroke="#10b981" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <rect x="620" y="60" width="250" height="200" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="745" y="82" text-anchor="middle" font-weight="bold" fill="#7c2d12">Waveshare Bus Servo</text>
  <text x="745" y="96" text-anchor="middle" font-size="10" fill="#7c2d12">Adapter (A) Driver Board</text>
  <rect x="635" y="108" width="220" height="22" rx="3" fill="#fed7aa" stroke="#fb923c"/>
  <text x="745" y="123" text-anchor="middle" font-size="10" fill="#7c2d12">⚠ Jumper on position A (UART mode)</text>
  <text x="635" y="148" font-size="10" fill="#431407">UART (3.3 V): T←GP0  R←GP1  G←GND</text>
  <text x="635" y="165" font-size="10" fill="#b45309">DC jack: 4–12.6 V (match servo variant)</text>
  <text x="635" y="182" font-size="10" fill="#431407">Servo port → ST3215 daisy chain</text>
  <text x="635" y="225" font-size="9" fill="#64748b">GND of Pico and board MUST be shared</text>
  <line x1="590" y1="205" x2="620" y2="175" stroke="#f97316" stroke-width="2.5" stroke-dasharray="7,3" marker-end="url(#arrow)"/>
  <rect x="630" y="300" width="230" height="100" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="745" y="320" text-anchor="middle" font-weight="bold" fill="#0f172a">ST3215 Servo(s)</text>
  <text x="745" y="336" text-anchor="middle" font-size="10" fill="#334155">360° encoder · ID 1..253</text>
  <text x="745" y="350" text-anchor="middle" font-size="10" fill="#334155">Default baud: 1 Mbaud</text>
  <text x="745" y="365" text-anchor="middle" font-size="10" fill="#334155">Daisy-chain · up to 32 per scan</text>
  <line x1="745" y1="260" x2="745" y2="300" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="30" y="450" width="860" height="160" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="450" y="470" text-anchor="middle" font-weight="bold" fill="#0f172a">Notes</text>
  <text x="50" y="490" font-size="10" fill="#0f172a">• Grove HY2.0-4P pin order: 1=Yellow/SDA · 2=White/SCL · 3=Red/VCC · 4=Black/GND (keyed, one way only)</text>
  <text x="50" y="507" font-size="10" fill="#dc2626">• Encoder moved to GP6/GP7 (I2C1) — if you previously used GP2/GP3, rewire to the next Grove I2C1 port</text>
  <text x="50" y="524" font-size="10" fill="#0f172a">• USB connection simultaneously powers the Pico and registers it as a Class-Compliant USB MIDI device</text>
  <text x="50" y="541" font-size="10" fill="#0f172a">• No driver installation needed on Windows 10+, macOS, or Linux — device appears as "ST3215 Servo Tester"</text>
  <text x="50" y="558" font-size="10" fill="#0f172a">• Servo power supply must match your servo variant: ST3215 std 4–7.4 V, ST3215-HS 9–12.6 V</text>
  <text x="50" y="575" font-size="10" fill="#0f172a">• Do NOT connect servo supply to Pico 5V/VSYS pins — use the driver board's dedicated DC jack</text>
  <text x="50" y="592" font-size="10" fill="#0f172a">• Grove shield power switch must be set to 3.3 V before powering on</text>
</svg>
