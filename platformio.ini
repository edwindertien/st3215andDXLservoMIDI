; PlatformIO Project Configuration File
;
; Build targets:
;   env:pico          — Raspberry Pi Pico + Grove Shield (SH1107, single encoder)
;   env:xiao_rp2040   — Seeed XIAO RP2040 + Expansion Board (SSD1306, 8-encoder)
;
; Select the active environment in VS Code's bottom status bar,
; or: pio run -e xiao_rp2040 -t upload
[platformio]
default_envs = xiao_rp2040

; =============================================================================
; [env] — settings applied to EVERY environment automatically
; =============================================================================
[env]
platform                    = https://github.com/maxgerhardt/platform-raspberrypi.git
board_build.core            = earlephilhower
framework                   = arduino
board_build.filesystem_size = 256k
monitor_speed               = 115200
lib_ldf_mode                = deep+
upload_protocol             = picotool

lib_deps =
    https://github.com/workloads/scservo.git
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit SH110X    @ ^2.1.10
    adafruit/Adafruit SSD1306   @ ^2.5.9
    adafruit/Adafruit TinyUSB Library @ ^3.1.0
    fortyseveneffects/MIDI Library @ ^5.0.2

; =============================================================================
; Shared build flags
; CFG_TUD_CDC=1 adds a USB CDC serial port alongside the MIDI interface.
; Connect via "pio device monitor" or any serial terminal at 115200.
; NOTE: USE_TINYUSB_HOST intentionally absent (breaks MIDI device).
; =============================================================================
[flags_common]
build_flags =
    -D USE_TINYUSB
    -D CFG_TUD_CDC=1
    -D PICO_STDIO_UART=0

; =============================================================================
; Environment: Raspberry Pi Pico + Grove Shield (Config A)
; =============================================================================
[env:pico]
board             = rpipicow
board_build.f_cpu = 120000000L
build_flags       =
    ${flags_common.build_flags}
    -D BOARD_PICO_GROVE
    -D ENCODER_M5_SINGLE
    -D DISPLAY_SH1107

; =============================================================================
; Environment: Seeed XIAO RP2040 + Seeed Expansion Board (Config B)
; =============================================================================
[env:xiao_rp2040]
board             = seeed_xiao_rp2040
board_build.f_cpu = 120000000L
build_flags       =
    ${flags_common.build_flags}
    -D BOARD_XIAO_EXPANSION
    -D ENCODER_M5_8UNIT
    -D DISPLAY_SSD1306