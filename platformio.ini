; PlatformIO Project Configuration File

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
board_build.core = earlephilhower
framework = arduino

; =========================
; USB: TinyUSB MIDI device
; =========================
build_flags =
    -D USE_TINYUSB
    -D PICO_STDIO_UART=0

; Reserve 256 KB of flash for LittleFS (at top of 2 MB flash)
board_build.filesystem_size = 256k

; =========================
; Monitor (UART-only now)
; =========================
monitor_speed = 115200

; =========================
; Libraries
; =========================
lib_deps =
    ; Waveshare / SCServo (STS/ST3215 support)
    https://github.com/workloads/scservo.git

    ; OLED display (SH1107)
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit SH110X @ ^2.1.10

    ; USB MIDI (TinyUSB transport + MIDI protocol)
    adafruit/Adafruit TinyUSB Library @ ^3.1.0
    fortyseveneffects/MIDI Library @ ^5.0.2

; =========================
; Optional (faster builds)
; =========================
lib_ldf_mode = deep+

; =========================
; Upload
; =========================
upload_protocol = picotool
